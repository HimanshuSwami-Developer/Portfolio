<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMD Portfolio - Himanshu</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .scroll-hide::-webkit-scrollbar { display: none; }
    .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes floatEarth {
      0% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
      100% { transform: translateY(0); }
    }
    .icon-green {
      filter: brightness(0) saturate(100%) invert(67%) sepia(97%) saturate(746%) hue-rotate(84deg) brightness(117%) contrast(118%);
    }
    .bar {
      height: 10px;
      background-color: #003300;
      border-radius: 9999px;
      overflow: hidden;
    }
    .bar-inner {
      height: 100%;
      background-color: #66ff66;
    }
    .sidebar {
      transition: all 0.3s ease;
    }
    .sidebar-mobile {
      position: fixed;
      top: 0;
      left: -100%;
      width: 80%;
      height: 100vh;
      z-index: 1000;
      background-color: #001100;
      transition: all 0.3s ease;
    }
    .sidebar-mobile.active {
      left: 0;
    }
    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 999;
    }
    .overlay.active {
      display: block;
    }
  </style>
</head>

  <!-- Main Content -->

    <aside class="hidden md:flex md:w-[20%] flex-col border-r border-[#00ff00] p-4 gap-4">
      <div class="flex flex-col items-center border-b border-[#00ff00] pb-4">
        <img src="https://wallpapers.com/images/high/green-hacker-on-laptop-hacking-android-l01s3i89ccyzpvwu.webp" alt="Profile" class="w-40 h-40 rounded-full object-cover border-2 border-[#00ff00]" />
        <h2 class="text-lg font-bold pt-2">Himanshu Swami</h2>

    <!-- Main Terminal -->

        <div class="flex items-center mt-4">
          <span class="mr-2 text-md md:text-md">C:\Users\Himanshu></span>
          <input type="text" id="cmdInput" class="flex-1 bg-black border-none outline-none text-[#00ff00] text-md font-mono" autofocus />

    <!-- Right Side Extras (Desktop) -->

        <img src="{{ url_for('static', filename='assets/earth.gif') }}" alt="Earth Animation" class="h-[100%] p-4 object-contain" />

  <!-- Script -->
  <script>
    // Mobile sidebar toggle
    const hamburger = document.getElementById('hamburger');
    const mobileSidebar = document.getElementById('mobileSidebar');
    const overlay = document.getElementById('overlay');
    
    hamburger.addEventListener('click', () => {
      mobileSidebar.classList.toggle('active');
      overlay.classList.toggle('active');
    });
    
    overlay.addEventListener('click', () => {
      mobileSidebar.classList.remove('active');
      overlay.classList.remove('active');
    });

    // Clock functionality
    function updateClock() {
      const now = new Date();
      document.getElementById('clock-date').textContent = now.toDateString();
      document.getElementById('clock-time').textContent = now.toLocaleTimeString(undefined, { hour12: false });
      
      // Update mobile clock if exists
      if (document.getElementById('clock-date-mobile')) {
        document.getElementById('clock-date-mobile').textContent = now.toDateString();
        document.getElementById('clock-time-mobile').textContent = now.toLocaleTimeString(undefined, { hour12: false });
      }
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Terminal functionality
    document.getElementById("terminalArea").addEventListener("click", () => {
      document.getElementById("cmdInput").focus();
    });

    const output = document.getElementById("output");
    const input = document.getElementById("cmdInput");
    let history = [], historyIndex = -1;

    let commands = {
      experience: {
        icon: "https://img.icons8.com/ios-filled/50/ffffff/briefcase.png",
        list: [
          {
            company: "Apnibuzz",
            role: "Frontend Developer",
            from: "April,2025",
            to: "Present",
            description: "Worked on building scalable frontend components using React.js, Tailwind, and state management tools."
          },
          {
            company: "XYZ Corp",
            role: "Intern Developer",
            from: "Jan,2024",
            to: "Mar,2024",
            description: "Built dashboard modules using Next.js and Firebase."
          }
        ]
      },
      about: {
        icon: "https://img.icons8.com/ios-filled/50/ffffff/user.png",
        text: "Hello, I'm Himanshu.\nA full-stack developer passionate about Flutter, Web, and AI."
      },
      skills: {
        icon: "https://img.icons8.com/ios-filled/50/ffffff/maintenance.png",
        text: "HTML, CSS, JS, Flutter, Firebase, Dart, REST APIs"
      },
      projects: {
        icon: "https://img.icons8.com/ios-filled/50/ffffff/source-code.png",
        text: "1. UPI POS App \n 2. Tracker Dashboard \n 3. PDF to Video/Audio Tool",
        upi: {
          title: "UPI POS App",
          description: "A Flutter app for UPI payments with Firebase backend.",
          tech: ["Flutter", "Firebase", "UPI"],
          image: "https://img.icons8.com/ios-filled/100/00ff00/mobile-payment.png",
          link: "https://github.com/himanshu123/upi-pos"
        },
        tracker: {
          title: "Tracker Dashboard",
          description: "A web dashboard for tracking various metrics.",
          tech: ["HTML", "CSS", "JavaScript"],
          image: "https://img.icons8.com/ios-filled/100/00ff00/dashboard.png",
          link: "https://github.com/himanshu123/tracker"
        },
        pdf: {
          title: "PDF to Video/Audio Tool",
          description: "A tool to convert PDF files into video or audio formats.",
          tech: ["Next.js", "JavaScript", "FFmpeg"],
          image: "https://img.icons8.com/ios-filled/100/00ff00/pdf.png",
          link: "https://github.com/himanshu123/pdf-tool"
        }
      },
      contact: {
        links: [
          { icon: "https://img.icons8.com/ios-filled/50/ffffff/email.png", label: "himanshu@example.com", url: "mailto:himanshu@example.com" },
          { icon: "https://img.icons8.com/ios-filled/50/ffffff/github.png", label: "github.com/himanshu123", url: "https://github.com/himanshu123" },
          { icon: "https://img.icons8.com/ios-filled/50/ffffff/linkedin.png", label: "linkedin.com/in/himanshu", url: "https://linkedin.com/in/himanshu" },
        ]
      },
      help: {
        icon: "https://img.icons8.com/ios-filled/50/ffffff/help.png",
        text: "Available commands:\nabout, skills, projects, projects/pdf, projects/tracker, projects/upi, contact, help, clear"
      }
    };

    function appendContactLinks(links) {
      links.forEach(link => {
        const line = document.createElement("div");
        line.className = "flex items-start gap-2 mt-2";

        // Icon
        const img = document.createElement("img");
        img.src = link.icon;
        img.className = "w-5 h-5 icon-green mt-1";
        line.appendChild(img);

        // Link text
        const anchor = document.createElement("a");
        anchor.href = link.url;
        anchor.target = "_blank";
        anchor.rel = "noopener noreferrer";
        anchor.textContent = link.label;
        anchor.className = "text-[#00ffaa] font-mono underline hover:text-green-400";
        line.appendChild(anchor);

        output.appendChild(line);
        output.scrollTop = output.scrollHeight;
      });
    }
    window.onload = function () {
      appendTypedText(
        "Welcome to Himanshu's Terminal. Type help to get started.",
        "https://img.icons8.com/ios-filled/50/ffffff/user.png",
        15
      );

    };

    function appendExperienceBlock(experiences) {
      experiences.forEach(exp => {
        const block = document.createElement("div");
        block.className = `
          bg-black 
          border border-[#00ff00] 
          text-[#00ff00] 
          font-mono 
          rounded 
          p-4 
          mt-3 
          shadow-[0_0_10px_#00ff00]
          transition-transform 
          hover:scale-[1.02] 
          duration-300
        `.trim();

        block.innerHTML = `
          <div class="mb-2">
            <div class="flex flex-col md:flex-row justify-between">
              <div class="text-md tracking-wide">
                <span class="text-[#00ffaa]">Company:</span> <strong>${exp.company}</strong>
              </div>
              <div class="text-sm text-[#66ff66]">
                <span class="text-[#00ffaa]">Duration:</span> ${exp.from} → ${exp.to}
              </div>
            </div>
            <div>
              <span class="text-[#00ffaa]">Role:</span> ${exp.role}
            </div>
          </div>
          <div class="text-sm">
            <span class="text-[#00ffaa]">Description:</span><br>${exp.description}
          </div>
        `;

        output.appendChild(block);
        output.scrollTop = output.scrollHeight;
      });
    }

    function appendLine(text, icon = null, isError = false) {
      const line = document.createElement("div");
      line.className = "flex items-start gap-2";
      if (icon) {
        const img = document.createElement("img");
        img.src = icon;
        img.className = "w-5 h-5 icon-green mt-1";
        line.appendChild(img);
      }
      const span = document.createElement("span");
      span.textContent = text;
      span.className = isError ? "text-red-500" : "whitespace-pre-wrap";
      line.appendChild(span);
      output.appendChild(line);
      output.scrollTop = output.scrollHeight;
    }

    function appendSkillBars(skills) {
      const wrapper = document.createElement("div");
      wrapper.className = "grid grid-cols-1 md:grid-cols-2 gap-4 mt-2 w-full";
      skills.forEach(skill => {
        const skillDiv = document.createElement("div");
        skillDiv.innerHTML = `
          <div class='text-[#00ffaa] font-semibold mb-1'>${skill.name}</div>
          <div class='bar'><div class='bar-inner' style='width: ${skill.level}%;'></div></div>`;
        wrapper.appendChild(skillDiv);
      });
      output.appendChild(wrapper);
    }

    function appendProjectNames(projects) {
      const container = document.createElement("div");
      container.className = "grid grid-cols-1 gap-2 mt-2";
      for (const key in projects) {
        if (['icon', 'text'].includes(key)) continue;
        const p = projects[key];
        const nameDiv = document.createElement("div");
        nameDiv.className = "cursor-pointer text-[#00ff00] hover:text-green-400 border-l-2 border-transparent hover:border-[#00ff00] pl-2";
        nameDiv.textContent = p.title;
        nameDiv.onclick = () => runCommand(`projects/${key}`);
        container.appendChild(nameDiv);
      }
      output.appendChild(container);
      output.scrollTop = output.scrollHeight;
    }

    function appendProjectDetails(project) {
      const container = document.createElement("div");
      container.className = "bg-black border border-[#00ff00] p-3 rounded-lg shadow-[0_0_10px_#00ff00] mt-2";
      container.innerHTML = `
        <div class="flex flex-col md:flex-row items-start gap-2 mb-2">
          <div class="flex-1">
            <h3 class="text-md font-bold mb-1 text-[#00ffaa]">📁 ${project.title}</h3>
            <p class="text-sm mb-2"><span class="text-[#00ffaa]">Explanation:</span> ${project.description}</p>
            <p class="text-sm mb-2"><span class="text-[#00ffaa]">Technology:</span> ${project.tech.join(', ')}</p>
            <p class="text-sm mb-2"><span class="text-[#00ffaa]">GitHub URL:</span> <a href="${project.link}" class="text-[#00ff00] hover:text-green-400 underline" target="_blank">${project.link}</a></p>
          </div>
          <div class="w-full md:w-[30%]">
            <img src="${project.image}" alt="${project.title} Snapshot" class="w-full h-32 md:h-40 object-contain border border-[#00ff00] rounded mt-2" />
          </div>
        </div>
      `;
      output.appendChild(container);
      output.scrollTop = output.scrollHeight;
    }

    function appendTypedText(text, icon = null, delay = 15, isError = false, skillData = null) {
      const line = document.createElement("div");
      line.className = "flex items-start gap-2";

      if (icon) {
        const img = document.createElement("img");
        img.src = icon;
        img.className = "w-5 h-5 icon-green mt-1";
        line.appendChild(img);
      }

      const span = document.createElement("span");
      span.className = `font-mono whitespace-pre-wrap ${
          isError ? "text-red-500" : "text-[#00ff00]"
        }`;

      line.appendChild(span);
      output.appendChild(line);

      // Convert \n to actual <br> tags
      const chars = text.replace(/\n/g, "<br>").split("");
      let i = 0;

      const interval = setInterval(() => {
        if (i < chars.length) {
          // Handle <br> as a full tag
          if (chars[i] === "<" && chars.slice(i, i + 4).join("") === "<br>") {
            span.innerHTML += "<br>";
            i += 4;
          } else {
            span.innerHTML += chars[i++];
          }
          output.scrollTop = output.scrollHeight;
        } else {
          clearInterval(interval);
          if (skillData) appendSkillBars(skillData);
        }
      }, delay);
    }

    function runCommand(cmd) {
      // Close mobile sidebar if open
      mobileSidebar.classList.remove('active');
      overlay.classList.remove('active');

      appendLine(`C:\\Users\\Himanshu> ${cmd}`);

      if (cmd.toLowerCase() === "clear" || cmd.toLowerCase() === "cls") {
        output.innerHTML = "";
        return;
      }

      if (cmd.toLowerCase().startsWith("ken ")) {
        const query = cmd.slice(4).trim();
        appendTypedText("Wait For Ken (Gemini AI) Response...", null, 10,false);

        fetch("/ask-gemini", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt: query })
        })
          .then(res => res.json())
          .then(data => appendTypedText(data.reply, null, 5))
          .catch(() => appendTypedText("Failed to reach Ken (Gemini AI).", null, 5,false ));
        return;
      }

      const parts = cmd.toLowerCase().split('/');
      const main = parts[0];
      const sub = parts[1];

      if (commands[main]) {
        if (main === "projects" && !sub) {
          appendTypedText("Showing project names...\n".replace(/\n/g, "<br>"), commands.projects.icon, 10);
          setTimeout(() => appendProjectNames(commands.projects), 400);
        } else if (main === "contact" && Array.isArray(commands.contact.links)) {
          appendContactLinks(commands.contact.links);
        } else if (main === "experience") {
          appendExperienceBlock(commands.experience.list);
        } else if (main === "projects" && sub && commands.projects[sub]) {
          const p = commands.projects[sub];
          appendTypedText(`Displaying details for ${p.title}...\n`.replace(/\n/g, "<br>"), commands.projects.icon, 10);
          setTimeout(() => appendProjectDetails(p), 400);
        } else if (!sub) {
          const skillList = main === 'skills' ? [
            { name: 'HTML', level: 95 },
            { name: 'CSS', level: 90 },
            { name: 'JavaScript', level: 85 },
            { name: 'Flutter', level: 80 },
            { name: 'Firebase', level: 80 },
            { name: 'Dart', level: 75 },
            { name: 'REST APIs', level: 85 }
          ] : null;

          const textWithBreaks = commands[main].text.replace(/\n/g, "<br>");
          appendTypedText(textWithBreaks, commands[main].icon, 15, false, skillList);
        } else {
          appendTypedText(`'${cmd}' is not recognized. Try 'help'.`, null, 15, true);
        }
      } else {
        appendTypedText(`'${cmd}' is not recognized. Try 'help'.`, null, 15, true);
      }
    }

    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        const command = input.value.trim();
        if (command !== "") {
          runCommand(command);
          history.push(command);
          historyIndex = history.length;
          input.value = "";
        }
      } else if (e.key === "ArrowUp") {
        if (historyIndex > 0) {
          historyIndex--;
          input.value = history[historyIndex];
        }
      } else if (e.key === "ArrowDown") {
        if (historyIndex < history.length - 1) {
          historyIndex++;
          input.value = history[historyIndex];
        } else {
          input.value = "";
          historyIndex = history.length;
        }
      }
    });

    function handleSidebar(cmd) {
      runCommand(cmd);
    }
  </script>
</body>
</html>
